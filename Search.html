<html>
	<head>
		<meta charset="UTF-8">
		<title>수강과목 조회</title>
	<script>
		var cols=9 // 행의 크기, 사람 수에 따라 조정
		var rows=4 // 열의 크기, 속성에 따라 조정
		var student=new Array(
		["소프트웨어 공학","전공","조상엽",'<img width="50px" height="50px" src="Simages/2.jpeg">'],
		["컴퓨터 구조","전공","이종찬",'<img width="50px" height="50px" src="Simages/2.jpeg">'],
		["운영체제","전공","김혁진",'<img width="50px" height="50px" src="Simages/2.jpeg">'],
		["자료구조","전공","류상률",'<img width="50px" height="50px" src="Simages/2.jpeg">'],
		["화일구조","전공","조상엽",'<img width="50px" height="50px" src="Simages/2.jpeg">'],
		["정보통신","전공","최규석",'<img width="50px" height="50px" src="Simages/2.jpeg">'],
		["스피치와 토론","교양","김태희",'<img width="50px" height="50px" src="Simages/2.jpeg">'],
		["학술저 글쓰기","교양","박선영",'<img width="50px" height="50px" src="Simages/2.jpeg">'],
		["역사속 리더쉽","교양","김병모",'<img width="50px" height="50px" src="Simages/2.jpeg">'])
		var result=new Array(cols) // 결과를 저장할 2차원 배열의 행 생성
		for(i=0;i<cols;i++){ // 결과를 저장할 2차원배열의 열 생성
			result[i]=new Array(rows)
		}
		for(i=0;i<cols;i++){ // 빈 행열 변수에는 NULL 역할을 할 0 입력
			for(k=0;k<rows;k++){
				result[i][k]=0
			}
		}
		var sel // 이름, 성별, 주소 중에서, 즉 어느 열에서 검색할지 정하는 변수
		var flag=0 // 결과를 찾은 수를 기록하는 변수, result 배열에 검색결과를 저장할 때 순차적으로 저장될 수 있도록 함
	</script>
	
	<script>
	function textClear(obj){ // 포커스 시 기존 안내 입력문자 클리어
	 obj.value=""
	}
	function search(list){

	   for(i=0;i<cols;i++){
		   if(student[i][sel].indexOf(list)>=0){ // 만약 검색어가 문자열에 포함되면, 즉 인덱스오브 값이 음수가 아니면+
			   result[flag]=student[i]
			   flag++
		   }
	   }
	   if(flag==0){alert("빈 칸에 검색어를 입력하세요. 예 : 소프트웨어 공학")} // 검색된 횟수가 0회일 때
	   else { // 검색된 횟수가 1 이상일 때
		document.write(list+"<font>에 대한 </font>"+flag+"<font>개의 검색 결과</font><br>")
		document.write("<table name=table1 border=2 cellpadding=5>")
		document.write("<tr bgcolor=lightgrey><td size=10>No</td><td>이름</td><td>성별</td><td>주소</td><td>사진</td></tr>")
		for(i=0;i<flag;i++){
			if(result[i][k]!=0){ // result 배열에서 값이 0이 나오기 전 까지 배열의 내용 기록
				document.write("<tr><td>"+(i+1))
				for(k=0;k<rows;k++){
					document.write("</td><td>"+result[i][k])
				}
			}
			else{break}


		}

	   }


	}
	function namesel(){ // 이름을 검색했을 때 실행
		sel=0;
	}
	function adsel(){ // 주소를 검색했을 때 실행
		sel=2;
	}

	function gensel(){ // 성별을 검색했을 때 실행
		sel=1;
	}

	</script>
	</head>

	<body>
	<font size=5>과목 이름을 검색하세요.</font>
	<form>
	과목명: <input name="name" type="text" size="10" value="과목명 입력" onfocus="textClear(this.form.name)">&nbsp&nbsp
	<input type="button" value="검색" onclick="namesel(); search(this.form.name.value); return false;"><br><br>
	과목 구분: <select name="gender">
	<option>전공</option>
	<option>교양</option>
	</select>&nbsp
	<input type=button value="검색" onclick="gensel(); search(this.form.gender.value);"><br><br>
	교수명: <input name="address" type="text" size="30" value="교수 이름을 입력하세요. 예)홍길동" onFocus="textClear(this.form.address)">&nbsp
	<input type=button value="검색" onclick="adsel();search(this.form.address.value)"><br>
	<br><br>
	<font size=4>전체 데이터베이스</font><br>
	<script>
		document.write("<table name=table1 border=2 cellpadding=5>")
		document.write("<tr bgcolor=lightgrey><td size=10>No</td><td>이름</td><td>성별</td><td>주소</td><td>사진</td></tr>")
		for(i=0;i<cols;i++){
			if(result[i][k]!=0){
				document.write("<tr><td>"+(i+1))
				for(k=0;k<rows;k++){
					document.write("</td><td>"+student[i][k])
				}
			}
			else{break}


		}

</script>
</body>
</html>

<html>
	<head>
		<meta charset="UTF-8">
		<title>재학생 검색시스템</title>
	<script>
		var cols=11 // 행의 크기, 사람 수에 따라 조정
		var rows=4 // 열의 크기, 속성에 따라 조정
		var student=new Array(
		["김준건","남자","인천",'<img width="50px" height="50px" src="Simages/1.png">'],
		["김준식","남자","서울",'<img width="50px" height="50px" src="Simages/2.jpeg">'],
		["김영희","여자","시흥",'<img width="50px" height="50px" src="Simages/3.jpeg">'],
		["임창묵","남자","시흥",'<img width="50px" height="50px" src="Simages/4.png">'],
		["서정훈","남자","인천",'<img width="50px" height="50px" src="Simages/5.png">'],
		["황인태","남자","시흥",'<img width="50px" height="50px" src="Simages/6.png">'],
		["손유노","남자","인천",'<img width="50px" height="50px" src="Simages/7.png">'],
		["오동현","남자","서울",'<img width="50px" height="50px" src="Simages/8.png">'],
		["김건우","남자","인천",'<img width="50px" height="50px" src="Simages/9.png">'],
		["신수빈","여자","인천",'<img width="50px" height="50px" src="Simages/10.png">'],
		["최혜림","여자","인천",'<img width="50px" height="50px" src="Simages/11.png">'])
		var result=new Array(cols) // 결과를 저장할 2차원 배열의 행 생성
		for(i=0;i<cols;i++){ // 결과를 저장할 2차원배열의 열 생성
			result[i]=new Array(rows)
		}
		for(i=0;i<cols;i++){ // 빈 행열 변수에는 NULL 역할을 할 0 입력
			for(k=0;k<rows;k++){
				result[i][k]=0
			}
		}
		var sel // 이름, 성별, 주소 중에서, 즉 어느 열에서 검색할지 정하는 변수
		var flag=0 // 결과를 찾은 수를 기록하는 변수
		var j=0 // result 배열에 검색결과를 저장할 때 순차적으로 저장될 수 있도록 함
	</script>
	
	<script>
	function textClear(obj){ // 포커스 시 기존 안내 입력문자 클리어
	 obj.value=""
	}
	function search(list){

	   for(i=0;i<cols;i++){
		   if(student[i][sel].indexOf(list)>=0){ // 만약 검색어가 문자열에 포함되면, 즉 인덱스오브 값이 음수가 아니면
			   flag++

			   result[j]=student[i]
			   j++
		   }
	   }
	   if(flag==0){alert("검색 결과가 없습니다.")} // 검색된 횟수가 0회일 때
	   else { // 검색된 횟수가 1 이상일 때
		document.write(list+"<font>에 대한 </font>"+flag+"<font>개의 검색 결과</font><br>")
		document.write("<table name=table1 border=2 cellpadding=5>")
		document.write("<tr bgcolor=lightgrey><td size=10>No</td><td>이름</td><td>성별</td><td>주소</td><td>사진</td></tr>")
		for(i=0;i<flag;i++){
			if(result[i][k]!=0){ // result 배열에서 값이 0이 나오기 전 까지 배열의 내용 기록
				document.write("<tr><td>"+(i+1))
				for(k=0;k<rows;k++){
					document.write("</td><td>"+result[i][k])
				}
			}
			else{break}


		}

	   }


	}
	function namesel(){ // 이름을 검색했을 때 실행
		sel=0;
	}
	function adsel(){ // 주소를 검색했을 때 실행
		sel=2;
	}

	function gensel(){ // 성별을 검색했을 때 실행
		sel=1;
	}

	</script>
	</head>

	<body>
	<font size=5>검색어를 입력 후 검색 하세요.</font>
	<form>
	이름: <input name="name" type="text" size="10" value="이름 입력" onfocus="textClear(this.form.name)">&nbsp&nbsp
	<input type="button" value="검색" onclick="namesel(); search(this.form.name.value); return false;"><br><br>
	성별: <select name="gender">
	<option>남자</option>
	<option>여자</option>
	</select>&nbsp
	<input type=button value="검색" onclick="gensel(); search(this.form.gender.value);"><br><br>
	주소: <input name="address" type="text" size="30" value="도시 이름을 입력하세요. 예)인천" onFocus="textClear(this.form.address)">&nbsp
	<input type=button value="검색" onclick="adsel();search(this.form.address.value)"><br>
	<br><br>
	<font size=4>전체 데이터베이스</font><br>
	<script>
		document.write("<table name=table1 border=2 cellpadding=5>")
		document.write("<tr bgcolor=lightgrey><td size=10>No</td><td>이름</td><td>성별</td><td>주소</td><td>사진</td></tr>")
		for(i=0;i<cols;i++){
			if(result[i][k]!=0){
				document.write("<tr><td>"+(i+1))
				for(k=0;k<rows;k++){
					document.write("</td><td>"+student[i][k])
				}
			}
			else{break}


		}

</script>
</body>
</html>
